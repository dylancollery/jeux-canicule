<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎨 Pictionary en Classe</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f0f23;color:#fff;min-height:100vh;display:flex;flex-direction:column;}
header{background:linear-gradient(135deg,#e74c3c,#f39c12);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
header h1{font-size:20pt;flex:1;}
.scores{display:flex;gap:10px;flex-wrap:wrap;}
.score-card{background:rgba(255,255,255,0.2);border-radius:8px;padding:6px 14px;text-align:center;cursor:pointer;transition:.2s;min-width:100px;}
.score-card:hover{background:rgba(255,255,255,0.35);}
.score-card .team-name{font-size:9pt;opacity:.85;margin-bottom:2px;}
.score-card .score-num{font-size:20pt;font-weight:900;}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:20px;}
.level-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.lvl-btn{padding:10px 22px;border:none;border-radius:30px;font-size:11pt;font-weight:bold;cursor:pointer;transition:.2s;opacity:.6;}
.lvl-btn.active{opacity:1;transform:scale(1.08);}
#lvl-cp{background:#3498db;color:#fff;}
#lvl-ce{background:#2ecc71;color:#fff;}
#lvl-cm{background:#9b59b6;color:#fff;}
.bank-counter{font-size:9pt;color:rgba(255,255,255,.5);text-align:center;}
.card-zone{width:100%;max-width:600px;text-align:center;}
.mot-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:3px solid #f39c12;border-radius:16px;padding:30px 20px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;transition:.2s;}
.mot-card:hover{border-color:#fff;}
.mot-hidden{font-size:14pt;color:#aaa;letter-spacing:2px;}
.mot-word{font-size:38pt;font-weight:900;color:#f1c40f;letter-spacing:2px;text-shadow:0 2px 12px rgba(241,196,15,.4);}
.mot-level{font-size:9pt;color:#aaa;margin-top:4px;}
.click-hint{font-size:9pt;color:#666;margin-top:8px;}
.timer-zone{width:100%;max-width:600px;}
.timer-bar-bg{background:#1a1a2e;border-radius:12px;height:22px;overflow:hidden;border:2px solid #333;}
.timer-bar{height:100%;background:linear-gradient(90deg,#2ecc71,#f39c12,#e74c3c);border-radius:10px;transition:width .2s linear;}
.timer-num{text-align:center;font-size:30pt;font-weight:900;margin-top:4px;}
.timer-num.urgent{color:#e74c3c;animation:pulse .5s infinite alternate;}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.1);}}
.controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:600px;}
.btn{padding:12px 24px;border:none;border-radius:10px;font-size:11pt;font-weight:bold;cursor:pointer;transition:.2s;}
.btn:hover{filter:brightness(1.15);}
.btn-start{background:#2ecc71;color:#fff;}
.btn-next{background:#3498db;color:#fff;}
.btn-point{background:#f39c12;color:#fff;font-size:13pt;}
.btn-fail{background:#e74c3c;color:#fff;}
.btn-reset{background:#555;color:#fff;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:#1a1a2e;border:2px solid #f39c12;border-radius:14px;padding:28px;max-width:480px;text-align:center;}
.modal h2{color:#f1c40f;margin-bottom:12px;}
.modal input{background:#0f0f23;color:#fff;border:1px solid #555;border-radius:6px;padding:8px 12px;font-size:11pt;width:100%;margin-bottom:8px;}
.modal .btn{margin:4px;font-size:10pt;padding:8px 16px;}
footer{background:#0a0a18;padding:10px;text-align:center;font-size:9pt;color:#555;}
</style>
</head>
<body>
<header>
  <h1>🎨 Pictionary en Classe</h1>
  <div class="scores" id="scores"></div>
  <button class="btn btn-reset" onclick="editTeams()">✏️ Équipes</button>
</header>
<main>
  <div class="level-btns">
    <button class="lvl-btn active" id="lvl-cp" onclick="setLevel('cp')">🔵 CP / CE1</button>
    <button class="lvl-btn" id="lvl-ce" onclick="setLevel('ce')">🟢 CE2 / CM1</button>
    <button class="lvl-btn" id="lvl-cm" onclick="setLevel('cm')">🟣 CM1 / CM2</button>
  </div>
  <div class="bank-counter" id="bankCounter"></div>
  <div class="card-zone">
    <div class="mot-card" id="motCard" onclick="revealWord()">
      <div class="mot-hidden" id="motHidden">🎲 Cliquer pour tirer un mot</div>
      <div class="mot-word" id="motWord" style="display:none;"></div>
      <div class="mot-level" id="motLevel"></div>
    </div>
    <div class="click-hint" id="clickHint">👆 Le dessinateur clique pour voir le mot (cachez l'écran aux autres !)</div>
  </div>
  <div class="timer-zone">
    <div class="timer-bar-bg"><div class="timer-bar" id="timerBar" style="width:100%;"></div></div>
    <div class="timer-num" id="timerNum">45</div>
  </div>
  <div class="controls">
    <button class="btn btn-start" id="btnStart" onclick="startTimer()">▶ Démarrer (45s)</button>
    <button class="btn btn-next" onclick="nextWord()">⏭ Nouveau mot</button>
    <button class="btn btn-point" onclick="addPoint()">✅ Deviné ! +1 pt</button>
    <button class="btn btn-fail" onclick="skipWord()">❌ Passer</button>
  </div>
</main>
<div class="overlay" id="teamOverlay">
  <div class="modal">
    <h2>✏️ Noms des équipes</h2>
    <div id="teamInputs"></div>
    <button class="btn btn-start" onclick="saveTeams()">💾 Valider</button>
  </div>
</div>
<div class="overlay" id="pointOverlay">
  <div class="modal">
    <h2>✅ +1 point pour quelle équipe ?</h2>
    <div id="pointBtns"></div>
    <button class="btn btn-reset" onclick="closePoint()">Annuler</button>
  </div>
</div>
<footer>🎨 Pictionary | Dessinez en 45 secondes — Pas de lettres, pas de mots, pas de gestes !</footer>
<script>
const WORDS = {
  cp:['chat','chien','maison','arbre','soleil','vélo','pomme','voiture','ballon','bateau','oiseau','fleur','table','livre','école','crayon','lune','étoile','poisson','lapin','vache','cochon','lion','chapeau','nuage','montagne','mer','train','avion','pizza','glace','gâteau','bébé','pluie','neige','feu','herbe','cheval','canard','grenouille','tortue','papillon','baleine','girafe','éléphant','hibou','coccinelle','arc-en-ciel','fusée','robot','clown','forêt','rivière','plage','château','île','bonbon','cerise','banane','raisin','citrouille','sapin','bougie','clé','pont','lunettes','parapluie','guitare','balançoire','toboggan','drapeau','couronne'],
  ce:['astronaute','château','dinosaure','volcan','phare','montgolfière','pingouin','bougie','parapluie','escalier','fantôme','licorne','pirate','plongeur','désert','jungle','igloo','chevalier','fusée','crocodile','perroquet','cactus','arc-en-ciel','sous-marin','pharaon','squelette','vampire','tempête','cascade','île','phoque','dentiste','pompier','bibliothèque','stade','cirque','laboratoire','boussole','carte','télescope','harmonica','trombone','trompette','dragon','sorcière','superhéros','pieuvre','requin','dauphin','orque','pyramide','labyrinthe','catapulte','lanterne','parchemin','kangourou','koala','flamant','méduse','homard','seiche','aquarium','volcanologue','archéologue','cartographe','déguisement','funambule','trapéziste','jongleur'],
  cm:['hélicoptère','laboratoire','thermomètre','locomotive','chauve-souris','microscope','avalanche','saxophone','chronomètre','calculatrice','parachute','ambulance','trampoline','marionnette','boomerang','aquarium','kaléidoscope','périscope','catapulte','pendule','stéthoscope','caricature','équilibriste','électricité','magnétisme','évaporation','photosynthèse','archéologue','astronome','chirurgien','porte-avions','aéroglisseur','monorail','téléphérique','stalagmite','stalactite','geyser','glacier','mangrove','calligraphie','enluminure','mosaïque','vitrail','fresque','métronome','partition','solfège','baguette','podium','origami','karaté','bonsaï','kimono','samouraï','télescopage','décollage','atterrissage','satellisation','paléontologue','océanographe','météorologiste','vulcanologue','caméléon','dromadaire','ornithorynque','piranha','anaconda','impressionnisme','calligraphe','enlumineur','orfèvre']
};
const LEVEL_NAMES = {cp:'CP / CE1', ce:'CE2 / CM1', cm:'CM1 / CM2'};
let level = 'cp';
let teams = ['Équipe 1','Équipe 2','Équipe 3','Équipe 4'];
let scores = [0,0,0,0];
let timer = null, timeLeft = 45, revealed = false;
// Anti-répétition : un Set par niveau, réinitialisé quand épuisé
const usedWords = {cp: new Set(), ce: new Set(), cm: new Set()};

function updateCounter(){
  const total = WORDS[level].length;
  const remaining = WORDS[level].filter(w=>!usedWords[level].has(w)).length;
  document.getElementById('bankCounter').textContent =
    `📦 Mots restants niveau ${LEVEL_NAMES[level]} : ${remaining} / ${total}`;
}

function setLevel(l){
  level = l;
  ['cp','ce','cm'].forEach(x=>{
    document.getElementById('lvl-'+x).classList.toggle('active', x===l);
  });
  nextWord();
}

function getRandWord(){
  let pool = WORDS[level].filter(w=>!usedWords[level].has(w));
  if(pool.length===0){ usedWords[level] = new Set(); pool = WORDS[level]; }
  const w = pool[Math.floor(Math.random()*pool.length)];
  usedWords[level].add(w);
  updateCounter();
  return w;
}

function revealWord(){
  if(revealed) return;
  revealed = true;
  document.getElementById('motHidden').style.display='none';
  document.getElementById('motWord').style.display='block';
  document.getElementById('clickHint').style.display='none';
}

function nextWord(){
  stopTimer();
  const w = getRandWord();
  revealed = false;
  document.getElementById('motWord').textContent = w.toUpperCase();
  document.getElementById('motLevel').textContent = '📊 Niveau : '+LEVEL_NAMES[level];
  document.getElementById('motHidden').style.display='block';
  document.getElementById('motWord').style.display='none';
  document.getElementById('clickHint').style.display='block';
  document.getElementById('btnStart').textContent='▶ Démarrer (45s)';
  document.getElementById('btnStart').style.background='#2ecc71';
  timeLeft=45; updateTimerDisplay();
}

function startTimer(){
  if(timer){stopTimer();return;}
  if(!revealed) revealWord();
  document.getElementById('btnStart').textContent='⏸ Pause';
  document.getElementById('btnStart').style.background='#e67e22';
  timer = setInterval(()=>{
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft<=0){
      stopTimer();
      document.getElementById('timerNum').textContent='⏰';
      document.getElementById('timerBar').style.width='0%';
      document.getElementById('btnStart').textContent='▶ Démarrer (45s)';
      document.getElementById('btnStart').style.background='#2ecc71';
    }
  },1000);
}

function stopTimer(){clearInterval(timer);timer=null;}

function updateTimerDisplay(){
  const pct=(timeLeft/45)*100;
  document.getElementById('timerBar').style.width=pct+'%';
  const el=document.getElementById('timerNum');
  el.textContent=timeLeft;
  el.classList.toggle('urgent',timeLeft<=10);
}

function addPoint(){
  document.getElementById('pointOverlay').classList.add('show');
  const d=document.getElementById('pointBtns');
  const colors=['#e74c3c','#3498db','#2ecc71','#f39c12'];
  d.innerHTML=teams.map((t,i)=>`<button class="btn btn-point" style="margin:6px;background:${colors[i]};" onclick="givePoint(${i})">${t}</button>`).join('');
}

function givePoint(i){
  scores[i]++;
  renderScores();
  closePoint();
  nextWord();
}

function closePoint(){document.getElementById('pointOverlay').classList.remove('show');}
function skipWord(){nextWord();}

function renderScores(){
  const colors=['#e74c3c','#3498db','#2ecc71','#f39c12'];
  document.getElementById('scores').innerHTML=teams.map((t,i)=>
    `<div class="score-card" style="border:2px solid ${colors[i]};" onclick="addPoint()">
      <div class="team-name">${t}</div>
      <div class="score-num">${scores[i]}</div>
    </div>`).join('');
}

function editTeams(){
  document.getElementById('teamOverlay').classList.add('show');
  document.getElementById('teamInputs').innerHTML=teams.map((t,i)=>
    `<input id="ti${i}" value="${t}" placeholder="Équipe ${i+1}">`).join('');
}
function saveTeams(){
  teams=teams.map((_,i)=>document.getElementById('ti'+i).value||'Équipe '+(i+1));
  renderScores();
  document.getElementById('teamOverlay').classList.remove('show');
}

renderScores();
nextWord();
</script>
</body>
</html>
